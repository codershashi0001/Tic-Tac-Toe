<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tic-tac-toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="new hide">
      <h1 class="win-msg">Congratulation 🎉🎊, You won The Game🥳</h1>
      <button id="re">New Game</button>
    </div>

    <main>
      <h1><span class="tic">TIC</span>-<span class="tac">TAC</span>-<span class="toe">TOE</span></h1>
   
<div class="choice">
  <button id="choice1" value="X">X</button>
      <button id="choice2" value="O">O</button>
</div>
      
      
        <div class="container">
        <div class="game">
          <button class="box box1" id="1" ></button>
          <button class="box box2" id="2" ></button>
          <button class="box box3" id="3" ></button>
          <button class="box box4" id="4" ></button>
          <button class="box box5" id="5" ></button>
          <button class="box box6" id="6" ></button>
          <button class="box box7" id="7" ></button>
          <button class="box box8" id="8" ></button>
          <button class="box box9" id="9" ></button>
        </div>
    </div>
    <button type="reset" id="reset">Reset</button>
    </main>

    <script src="./index.js"></script>
  </body>
</html>
